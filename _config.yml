# Jekyll Configuration for GitHub Pages
# https://pages.github.com/versions/

# Site Settings
title: "AI Agent Skills & MCP Ranking"
description: "全网最受欢迎的 AI Agent 技能包和 MCP 服务器排行榜"
url: "https://rammm0726.github.io"
baseurl: "/ai-skills-mcp-ranking"

# Build Settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
      author: "AI Skills Team"

# Exclude files from processing
exclude:
  - README.md
  - body.json
  - scripts/
  - .github/
  - Gemfile
  - Gemfile.lock

# Language Settings
languages: ["zh", "en"]
default_lang: "zh"

# SEO Settings
author:
  name: "AI Skills Ranking"
  email: "contact@example.com"

social:
  name: AI Skills Ranking
  links:
    - https://github.com/rammm0726
