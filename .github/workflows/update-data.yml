name: Weekly Ranking Update

on:
  schedule:
    # 每周一 00:00 UTC（北京时间周一 08:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:  # 支持手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Fetch Skills Data
        run: node scripts/fetch-skills.js
        
      - name: Fetch MCP Data
        run: node scripts/fetch-mcp.js
        
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 自动更新排行榜数据 (${{ steps.date.outputs.date }})"
          file_pattern: 'data/*.js'
          branch: main
          
      - name: Push to GitHub Pages
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git push origin main
