<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" fill="#fff">MCP Server - How It Works</text>

  <!-- User -->
  <rect x="50" y="180" width="120" height="60" fill="#8b5cf6" rx="8"/>
  <text x="110" y="215" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">User</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="210" x2="240" y2="210" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="235,205 240,210 235,215" fill="#8b5cf6"/>

  <!-- AI App -->
  <rect x="250" y="180" width="140" height="60" fill="#a78bfa" rx="8"/>
  <text x="320" y="215" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">AI App</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="210" x2="460" y2="210" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="455,205 460,210 455,215" fill="#8b5cf6"/>

  <!-- MCP Client -->
  <rect x="470" y="180" width="140" height="60" fill="#c4b5fd" rx="8"/>
  <text x="540" y="215" text-anchor="middle" font-family="Arial" font-size="14" fill="#1e293b">MCP Client</text>

  <!-- Arrow 3 -->
  <line x1="610" y1="210" x2="680" y2="210" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="675,205 680,210 675,215" fill="#8b5cf6"/>

  <!-- MCP Server -->
  <rect x="690" y="180" width="110" height="60" fill="#ddd6fe" rx="8"/>
  <text x="745" y="215" text-anchor="middle" font-family="Arial" font-size="14" fill="#1e293b">MCP Server</text>

  <!-- External System -->
  <rect x="350" y="280" width="150" height="60" fill="#f0abfc" rx="8"/>
  <text x="425" y="315" text-anchor="middle" font-family="Arial" font-size="14" fill="#1e293b">External System</text>

  <!-- Up Arrow -->
  <line x1="745" y1="240" x2="745" y2="280" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="740,285 745,280 750,285" fill="#8b5cf6"/>
</svg>
