<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" fill="#fff">Skills vs MCP - Architecture Comparison</text>

  <!-- Skills Section -->
  <rect x="50" y="80" width="300" height="280" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="200" y="120" text-anchor="middle" font-family="Arial" font-size="20" fill="#6366f1" font-weight="bold">Skills</text>

  <!-- MCP Section -->
  <rect x="450" y="80" width="300" height="280" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="600" y="120" text-anchor="middle" font-family="Arial" font-size="20" fill="#8b5cf6" font-weight="bold">MCP</text>

  <!-- Skills Components -->
  <rect x="100" y="150" width="200" height="40" fill="#6366f1" rx="4"/>
  <text x="200" y="175" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Prompt Templates</text>

  <rect x="100" y="210" width="200" height="40" fill="#6366f1" rx="4"/>
  <text x="200" y="235" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Embedded in Agent</text>

  <rect x="100" y="270" width="200" height="40" fill="#6366f1" rx="4"/>
  <text x="200" y="295" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Easy to Install</text>

  <!-- MCP Components -->
  <rect x="500" y="150" width="200" height="40" fill="#8b5cf6" rx="4"/>
  <text x="600" y="175" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">External Service</text>

  <rect x="500" y="210" width="200" height="40" fill="#8b5cf6" rx="4"/>
  <text x="600" y="235" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Standard Protocol</text>

  <rect x="500" y="270" width="200" height="40" fill="#8b5cf6" rx="4"/>
  <text x="600" y="295" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">System Integration</text>
</svg>
