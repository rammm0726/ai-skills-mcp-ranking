<article class="article-page">
    <header class="article-header">
        <div class="article-meta">
            <span class="article-date">{{ page.date }}</span>
            <span class="article-category">{{ page.category }}</span>
            <span class="article-reading-time">{{ page.reading_time }} min read</span>
        </div>
        <h1 class="article-title">{{ page.title }}</h1>
        <p class="article-subtitle">{{ page.subtitle }}</p>
        {% if page.featured_image %}
        <div class="featured-image-container">
            <img src="{{ page.featured_image }}" alt="{{ page.title }}" class="featured-image">
        </div>
        {% endif %}
    </header>
    <div class="article-content">
        {{ content }}
    </div>
    <div class="affiliate-disclosure">
        <p><strong>Disclosure:</strong> 部分链接可能包含联盟营销代码，你的支持帮助我们持续维护这个网站。</p>
    </div>
</article>
