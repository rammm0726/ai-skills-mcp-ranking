<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="24" fill="#fff">Claude Desktop - MCP Integration</text>

  <!-- Window frame -->
  <rect x="50" y="60" width="700" height="300" fill="#1e293b" stroke="#334155" stroke-width="2" rx="8"/>

  <!-- Window title bar -->
  <rect x="50" y="60" width="700" height="40" fill="#334155" rx="8"/>
  <circle cx="80" cy="80" r="6" fill="#ef4444"/>
  <circle cx="100" cy="80" r="6" fill="#f59e0b"/>
  <circle cx="120" cy="80" r="6" fill="#10b981"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">Claude Desktop</text>

  <!-- Chat area -->
  <rect x="80" y="120" width="640" height="180" fill="#0f172a" rx="8"/>
  
  <!-- Assistant message -->
  <rect x="100" y="140" width="400" height="60" fill="#1e293b" rx="8"/>
  <text x="120" y="165" font-family="Arial" font-size="13" fill="#fff">Let me check the files in your project...</text>
  <text x="120" y="185" font-family="Arial" font-size="11" fill="#94a3b8">[MCP] Filesystem - Reading directory /projects</text>

  <!-- Input bar -->
  <rect x="80" y="310" width="640" height="35" fill="#0f172a" stroke="#475569" stroke-width="1" rx="18"/>
  <text x="100" y="332" font-family="Arial" font-size="13" fill="#94a3b8">Ask Claude anything...</text>

  <!-- MCP indicator -->
  <circle cx="690" cy="328" r="6" fill="#10b981"/>
  <text x="660" cy="328" font-family="Arial" font-size="11" fill="#94a3b8">MCP Active</text>
</svg>
